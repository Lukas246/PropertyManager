$kind: http-request
name: Get Audit Log
method: GET
url: '{{baseUrl}}/api/v1/inventory/{{assetId}}/audit_log'
order: 4000
headers:
  - key: X-Api-Key
    value: '{{apiKey}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 OK", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is a non-empty array", function () {
          const json = pm.response.json();
          pm.expect(json).to.be.an("array").that.is.not.empty;
      });

      pm.test("Each entry has event, changes, and whodunnit fields", function () {
          const json = pm.response.json();
          json.forEach(function(entry) {
              pm.expect(entry).to.have.property("event");
              pm.expect(entry).to.have.property("changes");
              pm.expect(entry).to.have.property("whodunnit");
          });
      });

      pm.test("Response time is under 1000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(1000);
      });
